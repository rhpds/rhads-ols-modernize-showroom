---
type: showroom

# Set the left column width to 30%
default_width: 40
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

# Enable split view mode (Summit 2026 format)
view_switcher:
  enabled: true
  default_mode: split

tabs:
- name: OpenShift Console
  url: 'https://console-openshift-console.${DOMAIN}'
- name: Migration Toolkit for Applications
  url: 'https://mta-${USER}-mta.${DOMAIN}'
- name: OpenShift DevSpaces
  url: 'https://devspaces.${DOMAIN}'
- name: Gitea
  url: 'https://gitea-${USER}-gitea.${DOMAIN}/${USER}/kai-coolstore'
- name: OpenShift Gitops
  url: 'https://openshift-gitops-server-openshift-gitops.${DOMAIN}'

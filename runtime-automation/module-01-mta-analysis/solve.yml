---
- name: Module 01 Solve — MTA Assessment and Analysis
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    mta_namespace: "{{ student_user }}-mta"
    gitea_url: "https://gitea.{{ openshift_cluster_ingress_domain | default('') }}"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Find MTA hub pod (NetworkPolicy blocks cross-namespace HTTP;
    #           use k8s_exec into mta-hub pod to call localhost:8080)
    # -------------------------------------------------------
    - name: Find mta-hub pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ mta_namespace }}"
        label_selectors:
          - "role=mta-hub"
      register: r_mta_pods
      ignore_errors: true

    - name: Set mta-hub pod name
      ansible.builtin.set_fact:
        mta_hub_pod: "{{ (r_mta_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_mta_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Enable insecure Git repositories
    # -------------------------------------------------------
    - name: Enable insecure Git repositories in MTA
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s -X PUT http://localhost:8080/api/v1/settings/git.insecure.enabled -H 'Content-Type: application/json' -d 'true'"
      register: r_insecure_git
      when: mta_hub_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Enable Legacy Pathfinder questionnaire
    # -------------------------------------------------------
    - name: Get questionnaires list
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s http://localhost:8080/api/v1/questionnaires"
      register: r_questionnaires_raw
      when: mta_hub_pod is defined
      ignore_errors: true

    - name: Parse questionnaires and find Legacy Pathfinder ID
      ansible.builtin.set_fact:
        pathfinder_id: "{{ (r_questionnaires_raw.stdout | default('[]') | from_json | selectattr('name', 'search', 'Pathfinder') | list | first).id | default('') }}"
      when: r_questionnaires_raw.stdout is defined
      ignore_errors: true

    - name: Enable Legacy Pathfinder questionnaire (required = true)
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s -X PATCH http://localhost:8080/api/v1/questionnaires/{{ pathfinder_id }} -H 'Content-Type: application/json' -d '{\"required\":true}'"
      when: pathfinder_id is defined and pathfinder_id | length > 0
      register: r_enable_questionnaire
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Archetype assessment + review (Summer Framework)
    # -------------------------------------------------------
    - name: Get archetypes list
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s http://localhost:8080/api/v1/archetypes"
      register: r_archetypes_raw
      when: mta_hub_pod is defined
      ignore_errors: true

    - name: Find Summer Framework archetype ID
      ansible.builtin.set_fact:
        archetype_id: "{{ (r_archetypes_raw.stdout | default('[]') | from_json | selectattr('name', 'search', 'Summer Framework') | list | first).id | default('') }}"
      when: r_archetypes_raw.stdout is defined
      ignore_errors: true

    - name: Submit archetype review (Refactor / Small / criticality=10 / priority=9)
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s -X POST http://localhost:8080/api/v1/archetypes/{{ archetype_id }}/reviews -H 'Content-Type: application/json' -d '{\"proposedAction\":\"Refactor\",\"effortEstimate\":\"Small\",\"businessCriticality\":10,\"workPriority\":9}'"
      when: archetype_id is defined and archetype_id | length > 0
      register: r_archetype_review
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Configure Customers application with Git repo
    # -------------------------------------------------------
    - name: Get applications list
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s http://localhost:8080/api/v1/applications"
      register: r_applications_raw
      when: mta_hub_pod is defined
      ignore_errors: true

    - name: Find Customers application ID
      ansible.builtin.set_fact:
        customers_app_id: "{{ (r_applications_raw.stdout | default('[]') | from_json | selectattr('name', 'equalto', 'Customers') | list | first).id | default('') }}"
      when: r_applications_raw.stdout is defined
      ignore_errors: true

    - name: Configure Customers application with Git source repository
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s -X PATCH http://localhost:8080/api/v1/applications/{{ customers_app_id }} -H 'Content-Type: application/json' -d '{\"repository\":{\"kind\":\"git\",\"url\":\"{{ gitea_url }}/{{ student_user }}/kai-coolstore.git\",\"branch\":\"mta-lab\",\"path\":\"customers-tomcat-legacy\"}}'"
      when: customers_app_id is defined and customers_app_id | length > 0
      register: r_configure_app
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Trigger MTA analysis
    # -------------------------------------------------------
    - name: Trigger analysis for Customers application
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s -X POST http://localhost:8080/api/v1/tasks -H 'Content-Type: application/json' -d '{\"name\":\"Analyze Customers\",\"kind\":\"analyzer\",\"application\":{\"id\":{{ customers_app_id | int }}},\"data\":{\"mode\":\"source-code\",\"targets\":[\"containerization\",\"linux\",\"openjdk\"],\"scope\":{\"withDependencies\":false},\"rules\":{\"repository\":{\"kind\":\"git\",\"url\":\"{{ gitea_url }}/{{ student_user }}/kai-coolstore.git\",\"branch\":\"mta-lab\",\"path\":\"customrules\"}}}}'"
      when: customers_app_id is defined and customers_app_id | length > 0
      register: r_analysis_raw
      ignore_errors: true

    - name: Set analysis task ID
      ansible.builtin.set_fact:
        analysis_task_id: "{{ (r_analysis_raw.stdout | default('{}') | from_json).id | default('') }}"
      when: r_analysis_raw.stdout is defined
      ignore_errors: true

    - name: Wait for analysis to complete (up to 5 minutes)
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ mta_namespace }}"
        pod: "{{ mta_hub_pod }}"
        command: "curl -s http://localhost:8080/api/v1/tasks/{{ analysis_task_id }}"
      register: r_task_status_raw
      until: "(r_task_status_raw.stdout | default('{}') | from_json).state | default('') in ['Succeeded', 'Failed', 'Canceled']"
      retries: 30
      delay: 10
      when: analysis_task_id is defined and analysis_task_id | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          MTA hub pod: {{ mta_hub_pod | default('NOT FOUND') }}
          Insecure Git repos: {{ 'enabled' if (r_insecure_git is defined and r_insecure_git is not failed) else 'skipped' }}
          Legacy Pathfinder: {{ 'enabled (id=' + pathfinder_id | string + ')' if (pathfinder_id is defined and pathfinder_id | length > 0) else 'not found' }}
          Archetype review: {{ 'submitted' if (r_archetype_review is defined and r_archetype_review is not failed) else 'skipped' }}
          Customers app configured: {{ 'done (id=' + customers_app_id | string + ')' if (customers_app_id is defined and customers_app_id | length > 0) else 'skipped/failed' }}
          Analysis: {{ 'state=' + ((r_task_status_raw.stdout | default('{}') | from_json).state | default('triggered')) if (r_task_status_raw is defined) else 'triggered' if (r_analysis_raw is defined and r_analysis_raw is not failed) else 'not triggered' }}

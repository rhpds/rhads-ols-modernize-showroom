---
# Patch to add solver sidecar container to showroom deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: showroom
  namespace: user-sct29-showroom
spec:
  template:
    spec:
      serviceAccountName: showroom
      containers:
      # Solver API sidecar using AgnosticD EE directly
      - name: solver
        image: quay.io/agnosticd/ee-multicloud:chained-2026-04-01
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          # Create directory for Flask
          mkdir -p /tmp/pylibs
          # Install Flask to /tmp/pylibs
          /usr/local/bin/pip3 install --target=/tmp/pylibs flask==3.0.0 flask-cors==4.0.0
          # Add to PYTHONPATH and run
          export PYTHONPATH="/tmp/pylibs:${PYTHONPATH}"
          exec python3 /app/api-server.py
        ports:
        - containerPort: 5000
          protocol: TCP
        env:
        - name: K8S_AUTH_KUBECONFIG
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
        volumeMounts:
        - name: showroom-files
          mountPath: /playbooks
          subPath: repo/runtime-automation/playbooks
          readOnly: true
        - name: showroom-files
          mountPath: /app
          subPath: repo/runtime-automation
          readOnly: true

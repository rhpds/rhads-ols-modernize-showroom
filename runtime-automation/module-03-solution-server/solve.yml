---
- name: Module 03 Solve — Solution Server with Company Policy Rules
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    devworkspace_namespace: "{{ student_user }}-devworkspace"
    mta_hub_url: "http://mta-hub.{{ student_user }}-mta.svc.cluster.local:8080"
    gitea_url: "https://gitea.{{ openshift_cluster_ingress_domain | default('') }}"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Find DevSpaces workspace pod
    # -------------------------------------------------------
    - name: Find DevSpaces workspace pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ devworkspace_namespace }}"
      register: r_workspace_pods
      ignore_errors: true

    - name: Set workspace pod name
      ansible.builtin.set_fact:
        workspace_pod: "{{ (r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Switch to module3 git branch in workspace
    # -------------------------------------------------------
    - name: Stash any uncommitted changes in workspace
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git stash && echo stashed'"
      register: r_git_stash
      when: workspace_pod is defined
      ignore_errors: true

    - name: Switch to module3 git branch
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git checkout module3 && echo checked-out-module3'"
      register: r_git_checkout
      when: workspace_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Re-write provider-settings.yaml for module3 branch
    # (same config needed, branch switch may have reset settings/)
    # -------------------------------------------------------
    - name: Ensure provider-settings.yaml present for module3
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'mkdir -p /projects/kai-coolstore/settings && test -f /projects/kai-coolstore/settings/provider-settings.yaml && echo already-exists || echo needs-writing'"
      register: r_check_provider
      when: workspace_pod is defined
      ignore_errors: true

    - name: Write provider-settings.yaml if missing after branch switch
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "python3 -c \"import os; os.makedirs('/projects/kai-coolstore/settings',exist_ok=True); content='models:\\n  OpenAI: &active\\n    environment:\\n      OPENAI_API_KEY: \\\"{{ litellm_virtual_key | default(\\\"\\\")}}\\\",\\n    provider: ChatOpenAI\\n    args:\\n      model: llama-scout-17b\\n      configuration:\\n        baseURL: \\\"{{ litellm_api_base_url | default(\\\"\\\") }}\\\"\\n'; open('/projects/kai-coolstore/settings/provider-settings.yaml','w').write(content); print('written')\""
      when:
        - workspace_pod is defined
        - r_check_provider is defined
        - "'needs-writing' in (r_check_provider.stdout | default(''))"
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Verify Solution Server + MTA hub via k8s_exec (NetworkPolicy blocks direct HTTP)
    # kai-solution-server service selects app=kai-api pod
    # -------------------------------------------------------
    - name: Find mta-hub and kai-api pods
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}-mta"
        label_selectors:
          - "app=mta-hub"
      register: r_mta_hub_pod
      ignore_errors: true

    - name: Verify MTA hub is reachable via exec
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ student_user }}-mta"
        pod: "{{ (r_mta_hub_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
        command: "sh -c 'curl -s -o /dev/null -w \"%{http_code}\" http://localhost:8080/applications'"
      register: r_mta_health
      when: r_mta_hub_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    - name: Verify kai-solution-server (kai-api) is running
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}-mta"
        label_selectors:
          - "app=kai-api"
      register: r_kai_api
      ignore_errors: true

    - name: Set solution server reachable fact
      ansible.builtin.set_fact:
        r_solution_server_ok: "{{ r_kai_api.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0 }}"

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          DevSpaces workspace: {{ workspace_pod | default('not found') }}
          Git stash: {{ 'done' if (r_git_stash is defined and r_git_stash is not failed) else 'skipped' }}
          Git checkout module3: {{ 'done — ' + (r_git_checkout.stdout | default('')) if (r_git_checkout is defined and r_git_checkout is not failed) else 'failed — workspace may not have module3 branch' }}
          Solution Server (kai-api): {{ 'running' if r_solution_server_ok | default(false) else 'not running' }}
          MTA hub: {{ 'reachable' if (r_mta_health is defined and r_mta_health is not failed and '200' in (r_mta_health.stdout | default(''))) else 'NOT reachable' }}

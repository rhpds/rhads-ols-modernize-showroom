---
- name: Solve Module 04 - MTA Analysis
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Executing solve for Module 04: Analyzing Legacy Applications with MTA"

    - name: Get current namespace
      ansible.builtin.command:
        cmd: oc project -q
      register: current_ns
      changed_when: false

    - name: Display current namespace
      ansible.builtin.debug:
        msg: "Working in namespace: {{ current_ns.stdout }}"

    - name: Get pods in current namespace
      ansible.builtin.command:
        cmd: oc get pods -o json
      register: pods_output
      changed_when: false

    - name: Parse pods JSON
      ansible.builtin.set_fact:
        pods: "{{ (pods_output.stdout | from_json).items }}"

    - name: Display pod count
      ansible.builtin.debug:
        msg: "Found {{ pods | length }} pods in namespace {{ current_ns.stdout }}"

    - name: List pod names and status
      ansible.builtin.debug:
        msg: "Pod: {{ item.metadata.name }} - Status: {{ item.status.phase }}"
      loop: "{{ pods }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Completion message
      ansible.builtin.debug:
        msg: "✅ Module 04 solve completed successfully!"

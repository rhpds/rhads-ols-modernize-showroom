---
- name: Solve Module 03 - MTA Analysis
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Executing solve for Module 03: Analyzing Legacy Applications with MTA"

    - name: Get showroom namespace pods
      ansible.builtin.command:
        cmd: oc get pods -n user-sct29-showroom -o json
      register: pods_output
      changed_when: false

    - name: Parse pods JSON
      ansible.builtin.set_fact:
        pods_data: "{{ pods_output.stdout | from_json }}"

    - name: Extract pod items
      ansible.builtin.set_fact:
        pods: "{{ pods_data.items }}"

    - name: Display pod count
      ansible.builtin.debug:
        msg: "Found {{ pods | length }} pods in namespace user-sct29-showroom"

    - name: List pod names and status
      ansible.builtin.debug:
        msg: "Pod: {{ item.metadata.name }} - Status: {{ item.status.phase }}"
      loop: "{{ pods }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Completion message
      ansible.builtin.debug:
        msg: "✅ Module 03 solve completed successfully!"

---
- name: Solve Module 02 - Developer Lightspeed
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Executing solve for Module 02: AI-Assisted Code Modernization"

    - name: Get OpenShift namespaces
      kubernetes.core.k8s_info:
        kind: Namespace
      register: namespaces

    - name: Display namespaces
      ansible.builtin.debug:
        msg: "Found {{ namespaces.resources | length }} namespaces"

    - name: List namespace names
      ansible.builtin.debug:
        msg: "{{ item.metadata.name }}"
      loop: "{{ namespaces.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Completion message
      ansible.builtin.debug:
        msg: "Module 02 solve completed successfully!"

---
- name: Solve Module 02 - MTA Analysis
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display module information
      ansible.builtin.debug:
        msg: "Executing solve for Module 02: Analyzing Legacy Applications with MTA"

    - name: Get OpenShift namespaces
      ansible.builtin.command:
        cmd: oc get namespaces -o json
      register: ns_output
      changed_when: false

    - name: Parse namespace JSON
      ansible.builtin.set_fact:
        namespaces: "{{ (ns_output.stdout | from_json).items }}"

    - name: Display namespace count
      ansible.builtin.debug:
        msg: "Found {{ namespaces | length }} namespaces"

    - name: List namespace names
      ansible.builtin.debug:
        msg: "{{ item.metadata.name }}"
      loop: "{{ namespaces }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: Completion message
      ansible.builtin.debug:
        msg: "✅ Module 02 solve completed successfully!"

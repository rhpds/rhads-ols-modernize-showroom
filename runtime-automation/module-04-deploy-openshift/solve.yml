---
- name: Module 04 Solve — Deploy to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    devworkspace_namespace: "{{ student_user }}-devworkspace"
    coolstore_namespace: "{{ student_user }}-coolstore"
    openshift_api: "{{ openshift_api_url | default('') }}"
    student_password: "{{ password | default('') }}"
    gitea_host: "gitea.{{ openshift_cluster_ingress_domain | default('') }}"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Find DevSpaces workspace pod
    # -------------------------------------------------------
    - name: Find DevSpaces workspace pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ devworkspace_namespace }}"
      register: r_workspace_pods
      ignore_errors: true

    - name: Set workspace pod name
      ansible.builtin.set_fact:
        workspace_pod: "{{ (r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Switch to module4 git branch in DevSpaces
    # -------------------------------------------------------
    - name: Stash and switch to module4
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git stash 2>/dev/null; git checkout module4 && echo checked-out-module4'"
      register: r_git_checkout
      when: workspace_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Login to OCP + deploy PostgreSQL via oc new-app
    # -------------------------------------------------------
    - name: Login to OpenShift from DevSpaces
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc login --server={{ openshift_api }} --username={{ student_user }} --password={{ student_password }} --insecure-skip-tls-verify=true && oc project {{ coolstore_namespace }} && echo logged-in'"
      register: r_oc_login
      when: workspace_pod is defined
      ignore_errors: true

    - name: Deploy PostgreSQL via oc new-app
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc new-app -n {{ coolstore_namespace }} -e POSTGRESQL_USER=quarkus -e POSTGRESQL_PASSWORD=quarkus -e POSTGRESQL_DATABASE=coolstore openshift/postgresql:latest --name=coolstore-database 2>&1 | tail -3 || echo already-exists'"
      register: r_deploy_postgres
      when:
        - workspace_pod is defined
        - r_oc_login is not failed
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Delete old binary BuildConfig + create Source BuildConfig
    #   Binary S2I builds require a live HTTP connection (exec timeout kills them).
    #   Source BuildConfig points to gitea — runs independently on OCP cluster.
    # -------------------------------------------------------
    - name: Delete old binary BuildConfig (if exists)
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: absent
        api_version: build.openshift.io/v1
        kind: BuildConfig
        name: coolstore
        namespace: "{{ coolstore_namespace }}"
      ignore_errors: true

    - name: Create ImageStream for coolstore
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: coolstore
            namespace: "{{ coolstore_namespace }}"
      ignore_errors: true

    - name: Create Source BuildConfig from gitea module4 branch
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: coolstore
            namespace: "{{ coolstore_namespace }}"
            labels:
              app: coolstore
          spec:
            source:
              type: Git
              git:
                uri: "https://{{ gitea_host }}/{{ student_user }}/kai-coolstore.git"
                ref: module4
              contextDir: "/"
            strategy:
              type: Source
              sourceStrategy:
                from:
                  kind: ImageStreamTag
                  namespace: openshift
                  name: "java:openjdk-21-ubi8"
                env:
                  - name: MAVEN_ARGS
                    value: "clean package -DskipTests -Dquarkus.package.jar.type=fast-jar"
            output:
              to:
                kind: ImageStreamTag
                name: "coolstore:1.0.0-SNAPSHOT"
            triggers:
              - type: ConfigChange
      register: r_bc_create
      ignore_errors: true

    - name: Start coolstore build from gitea source
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildRequest
          metadata:
            name: coolstore
            namespace: "{{ coolstore_namespace }}"
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Wait for OCP Build to complete (up to 10 minutes)
    # -------------------------------------------------------
    - name: Wait for new build to start
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ coolstore_namespace }}"
      register: r_builds
      until: >
        r_builds.resources | default([]) |
        selectattr('status.phase', 'in', ['Running', 'Pending', 'Complete', 'Failed']) |
        list | length > 0
      retries: 12
      delay: 10
      ignore_errors: true

    - name: Wait for build to complete
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ coolstore_namespace }}"
      register: r_build_done
      until: >
        r_build_done.resources | default([]) |
        selectattr('status.phase', 'equalto', 'Complete') |
        list | length > 0
      retries: 30
      delay: 20
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Create/update Deployment using the built image + create route
    # -------------------------------------------------------
    - name: Create coolstore Service
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: coolstore
            namespace: "{{ coolstore_namespace }}"
            labels:
              app: coolstore
          spec:
            selector:
              app: coolstore
            ports:
              - port: 8080
                targetPort: 8080
      ignore_errors: true

    - name: Create coolstore Deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: coolstore
            namespace: "{{ coolstore_namespace }}"
            labels:
              app: coolstore
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: coolstore
            template:
              metadata:
                labels:
                  app: coolstore
              spec:
                containers:
                  - name: coolstore
                    image: "image-registry.openshift-image-registry.svc:5000/{{ coolstore_namespace }}/coolstore:1.0.0-SNAPSHOT"
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
                    env:
                      - name: QUARKUS_DATASOURCE_JDBC_URL
                        value: "jdbc:postgresql://coolstore-database:5432/coolstore"
                      - name: QUARKUS_DATASOURCE_USERNAME
                        value: quarkus
                      - name: QUARKUS_DATASOURCE_PASSWORD
                        value: quarkus
      ignore_errors: true

    - name: Create edge route for coolstore
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc create route edge acme-coolstore --service=coolstore --port=8080 -n {{ coolstore_namespace }} 2>/dev/null || echo route-exists'"
      when: workspace_pod is defined
      ignore_errors: true

    - name: Wait for coolstore deployment to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Deployment
        name: coolstore
        namespace: "{{ coolstore_namespace }}"
      register: r_coolstore_deploy
      until: >
        (r_coolstore_deploy.resources | default([{}]) | first).status.readyReplicas | default(0) | int >= 1
      retries: 18
      delay: 10
      ignore_errors: true

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          DevSpaces workspace: {{ workspace_pod | default('not found') }}
          Git checkout module4: {{ 'done' if (r_git_checkout is not failed) else 'failed' }}
          PostgreSQL: {{ 'deployed' if (r_deploy_postgres is not failed) else 'failed/skipped' }}
          BuildConfig created: {{ 'done' if (r_bc_create is not failed) else 'failed' }}
          Build phase: {{ (r_build_done.resources | default([]) | map(attribute='status.phase') | list | join(', ')) or 'pending' }}
          Coolstore deployment ready: {{ 'yes' if ((r_coolstore_deploy.resources | default([{}]) | first).status.readyReplicas | default(0) | int >= 1) else 'not yet' }}

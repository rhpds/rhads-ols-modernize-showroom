---
- name: Module 04 Solve — Deploy to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    devworkspace_namespace: "{{ student_user }}-devworkspace"
    coolstore_namespace: "{{ student_user }}-coolstore"
    openshift_api: "{{ openshift_api_url | default('') }}"
    student_password: "{{ password | default('') }}"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Find DevSpaces workspace pod
    # -------------------------------------------------------
    - name: Find DevSpaces workspace pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ devworkspace_namespace }}"
      register: r_workspace_pods
      ignore_errors: true

    - name: Set workspace pod name
      ansible.builtin.set_fact:
        workspace_pod: "{{ (r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Switch to module4 git branch
    # -------------------------------------------------------
    - name: Stash and switch to module4
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git stash 2>/dev/null; git checkout module4 && echo checked-out-module4'"
      register: r_git_checkout
      when: workspace_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Login to OCP + deploy PostgreSQL
    # -------------------------------------------------------
    - name: Login to OpenShift from DevSpaces
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc login --server={{ openshift_api }} --username={{ student_user }} --password={{ student_password }} --insecure-skip-tls-verify=true && oc project {{ coolstore_namespace }} && echo logged-in'"
      register: r_oc_login
      when: workspace_pod is defined
      ignore_errors: true

    - name: Deploy PostgreSQL via oc new-app
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc new-app -n {{ coolstore_namespace }} -e POSTGRESQL_USER=quarkus -e POSTGRESQL_PASSWORD=quarkus -e POSTGRESQL_DATABASE=coolstore openshift/postgresql:latest --name=coolstore-database 2>&1 || echo already-exists'"
      register: r_deploy_postgres
      when:
        - workspace_pod is defined
        - r_oc_login is not failed
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Start Maven build in BACKGROUND (nohup)
    #   Running synchronously cancels the OCP S2I build when exec times out.
    #   nohup keeps it alive; Task 5 polls Build status via k8s API.
    # -------------------------------------------------------
    - name: Start coolstore build in background (nohup)
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && nohup mvn clean compile package -DskipTests -Dquarkus.kubernetes.deploy=true > /tmp/coolstore-deploy.log 2>&1 & echo BUILD_STARTED_PID=$!'"
      register: r_mvn_start
      when:
        - workspace_pod is defined
        - r_git_checkout is not failed
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Poll OCP Build status (build runs in coolstore namespace)
    # -------------------------------------------------------
    - name: Wait for OCP Build to appear
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ coolstore_namespace }}"
      register: r_builds
      until: r_builds.resources | default([]) | length > 0
      retries: 12
      delay: 10
      ignore_errors: true

    - name: Wait for OCP Build to complete (up to 8 minutes)
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ coolstore_namespace }}"
      register: r_build_status
      until: >
        r_build_status.resources | default([]) |
        selectattr('status.phase', 'in', ['Complete', 'Failed', 'Error', 'Cancelled']) |
        list | length > 0
      retries: 24
      delay: 20
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Create route and wait for deployment
    # -------------------------------------------------------
    - name: Create edge route for coolstore app
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc create route edge acme-coolstore --service=coolstore --port=8080 -n {{ coolstore_namespace }} 2>/dev/null || echo route-exists'"
      register: r_create_route
      when: workspace_pod is defined
      ignore_errors: true

    - name: Wait for coolstore deployment to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Deployment
        namespace: "{{ coolstore_namespace }}"
      register: r_coolstore_deploy
      until: >
        r_coolstore_deploy.resources | default([]) |
        selectattr('status.readyReplicas', 'defined') |
        list | length > 0
      retries: 12
      delay: 10
      ignore_errors: true

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          DevSpaces workspace: {{ workspace_pod | default('not found') }}
          Git checkout module4: {{ 'done' if (r_git_checkout is not failed) else 'failed' }}
          PostgreSQL: {{ 'deployed' if (r_deploy_postgres is not failed) else 'failed/skipped' }}
          Maven build started: {{ r_mvn_start.stdout | default('not started') | trim }}
          Build phase: {{ (r_build_status.resources | default([]) | map(attribute='status.phase') | list | join(', ')) or 'pending' }}
          App ready: {{ 'yes' if (r_coolstore_deploy.resources | default([]) | selectattr('status.readyReplicas', 'defined') | list | length > 0) else 'not yet' }}

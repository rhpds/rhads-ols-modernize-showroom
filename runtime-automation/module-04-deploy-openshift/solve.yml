---
- name: Module 04 Solve — Deploy to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    devworkspace_namespace: "{{ student_user }}-devworkspace"
    coolstore_namespace: "{{ student_user }}-coolstore"
    openshift_api: "{{ openshift_api_url | default('') }}"
    student_password: "{{ password | default('') }}"
    ingress_domain: "{{ openshift_cluster_ingress_domain | default('') }}"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Find DevSpaces workspace pod
    # -------------------------------------------------------
    - name: Find DevSpaces workspace pod
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ devworkspace_namespace }}"
      register: r_workspace_pods
      ignore_errors: true

    - name: Set workspace pod name
      ansible.builtin.set_fact:
        workspace_pod: "{{ (r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Switch to module4 git branch
    # -------------------------------------------------------
    - name: Stash any uncommitted changes
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git stash && echo stashed'"
      register: r_git_stash
      when: workspace_pod is defined
      ignore_errors: true

    - name: Switch to module4 git branch
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && git checkout module4 && echo checked-out-module4'"
      register: r_git_checkout
      when: workspace_pod is defined
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Verify coolstore namespace exists
    # -------------------------------------------------------
    - name: Verify coolstore namespace exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Namespace
        name: "{{ coolstore_namespace }}"
      register: r_coolstore_ns
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Deploy PostgreSQL database in coolstore namespace
    # -------------------------------------------------------
    - name: Login to OpenShift and switch to coolstore project
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc login --server={{ openshift_api }} --username={{ student_user }} --password={{ student_password }} --insecure-skip-tls-verify=true && oc project {{ coolstore_namespace }} && echo logged-in'"
      register: r_oc_login
      when: workspace_pod is defined
      ignore_errors: true

    - name: Deploy PostgreSQL database via oc new-app (matches lab instructions)
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc new-app -n {{ coolstore_namespace }} -e POSTGRESQL_USER=quarkus -e POSTGRESQL_PASSWORD=quarkus -e POSTGRESQL_DATABASE=coolstore openshift/postgresql:latest --name=coolstore-database 2>/dev/null || echo already-exists && echo postgres-deployed'"
      register: r_deploy_postgres
      when:
        - workspace_pod is defined
        - r_oc_login is not failed
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Build and deploy coolstore application
    # -------------------------------------------------------
    - name: Build and deploy coolstore application via Quarkus Maven plugin
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'cd /projects/kai-coolstore && mvn clean compile package -DskipTests -Dquarkus.kubernetes.deploy=true 2>&1 | tail -20 && echo BUILD-DONE'"
      register: r_mvn_deploy
      when:
        - workspace_pod is defined
        - r_git_checkout is not failed
      ignore_errors: true

    # -------------------------------------------------------
    # Task 6 — Wait for coolstore deployment to be ready
    # -------------------------------------------------------
    - name: Create edge route for coolstore app
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ devworkspace_namespace }}"
        pod: "{{ workspace_pod }}"
        command: "sh -c 'oc create route edge acme-coolstore --service=coolstore --port=8080 -n {{ coolstore_namespace }} 2>/dev/null || echo route-exists'"
      register: r_create_route
      when: workspace_pod is defined
      ignore_errors: true

    - name: Wait for coolstore deployment to be ready
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Deployment
        namespace: "{{ coolstore_namespace }}"
      register: r_coolstore_deploy
      until: >
        r_coolstore_deploy.resources | default([]) |
        selectattr('status.readyReplicas', 'defined') |
        list | length > 0
      retries: 18
      delay: 10
      ignore_errors: true

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          DevSpaces workspace: {{ workspace_pod | default('not found') }}
          Git checkout module4: {{ 'done' if (r_git_checkout is defined and r_git_checkout is not failed) else 'failed' }}
          Coolstore namespace: {{ 'exists' if (r_coolstore_ns.resources | default([]) | length > 0) else 'NOT found' }}
          PostgreSQL deployed: {{ 'done' if (r_deploy_postgres is defined and r_deploy_postgres is not failed) else 'failed/skipped' }}
          App build+deploy: {{ 'done' if (r_mvn_deploy is defined and r_mvn_deploy is not failed) else 'failed/skipped — check mvn output' }}
          App ready: {{ 'yes' if (r_coolstore_deploy.resources | default([]) | selectattr('status.readyReplicas', 'defined') | list | length > 0) else 'not yet ready' }}
